{% extends 'base.html' %}

{% block title %}ログイン | AI Problem Discovery Lab{% endblock %}

{% block content %}
<section class="auth-panel">
    <div>
        <p class="eyebrow">AI Problem Discovery Lab</p>
        <h1>ログイン</h1>
        <p class="lead">日常の違和感を、研究・実装・事業化につながる課題へ育てます。</p>
    </div>
    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="primary-button" type="submit">ログイン</button>
        <p class="muted">アカウントがない場合は <a href="{% url 'signup' %}">新規登録</a></p>
    </form>
</section>
{% endblock %}
