{% extends 'base.html' %}

{% block title %}新規登録 | AI Problem Discovery Lab{% endblock %}

{% block content %}
<section class="auth-panel">
    <div>
        <p class="eyebrow">Start Discovery</p>
        <h1>新規登録</h1>
        <p class="lead">まずは自分用の課題発見ノートとして使い始められます。</p>
    </div>
    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="primary-button" type="submit">登録して始める</button>
        <p class="muted">すでにアカウントがある場合は <a href="{% url 'login' %}">ログイン</a></p>
    </form>
</section>
{% endblock %}
